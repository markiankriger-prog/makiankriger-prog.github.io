<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Вгадай пісню</title>

<style>
body {
  font-family: 'Arial Black', sans-serif;
  text-align: center;
  color: white;
  background: radial-gradient(circle at top, #1a2a6c, #b21f1f, #fdbb2d);
}

h1 {
  margin-top: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 110px);
  gap: 20px;
  justify-content: center;
  margin-top: 40px;
  perspective: 1200px;
}

.card {
  width: 110px;
  height: 110px;
  position: relative;
  cursor: pointer;
  transform-style: preserve-3d;
  transition: transform 0.6s;
}

.card.flip {
  transform: rotateY(180deg);
}

.card-face {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 16px;
  font-size: 12px;
  backface-visibility: hidden;
  padding: 6px;
  text-align: center;
}

.front {
  background: linear-gradient(145deg, #00c6ff, #0072ff);
}

.back {
  background: linear-gradient(145deg, #ff416c, #ff4b2b);
  transform: rotateY(180deg);
}

.controls {
  margin-top: 20px;
}

input {
  padding: 10px;
  font-size: 16px;
  width: 250px;
  border-radius: 10px;
  border: none;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.result {
  margin-top: 10px;
  font-weight: bold;
}

.result.shake {
  animation: shake 0.4s;
}

@keyframes shake {
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
}
</style>
</head>

<body>

<h1>🎵 Вгадай пісню</h1>

<div class="grid" id="grid"></div>

<div class="controls">
  <input type="text" id="guess" placeholder="Введи назву пісні...">
  <br>
  <button onclick="checkAnswer()">Відповісти</button>
  <div class="result" id="result"></div>
</div>

<button onclick="playSong()">▶️ Пісня</button>
<button onclick="nextSong()">Наступна пісня</button>

<audio id="audio"></audio>

<script>
const songs = [
  {
    words: ["Fein","Fein","Fein","Fein","Fein","Fein","Fein","Fein"],
    answer: "f!en",
    audio: "songs/Travis Scott - fein [muzce.com]_2.wav"
  },
  {
    words: ["такі","молоді","плутали","ночі-дні","кожен","день","хоч","на нулі"],
    answer: "такі молоді",
    audio: "songs/ivan-navi-taki-molodi.wav"
  },
  {
    words: ["Despacito","Quiero","respirar","tu","cuello","despacito","Deja","que"],
    answer: "despacito",
    audio: "songs/1760091007_luis-fonsi-daddy-yankee-despacito.wav"
  },
  {
    words: ["І","мій","внутрішній","голос","ніколи","не","радить","поганого"],
    answer: "останнє бажання",
    audio: "songs/nikow-ostannye-bazhannya.wav"
  },
  {
    words: ["Зцапала","злапала","спутала","я","взагалі","не","виступаю","вдома"],
    answer: "зцапала злапала",
    audio: "songs/1741252328_-zcapala-zlapala.wav"
  }
];

let index = 0;
let current;

function loadSong() {
  current = songs[index];

  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  document.getElementById("result").textContent = "";
  document.getElementById("guess").value = "";

  const audio = document.getElementById("audio");
  audio.src = current.audio;

  current.words.forEach(word => {
    const card = document.createElement("div");
    card.className = "card";

    const front = document.createElement("div");
    front.className = "card-face front";
    front.textContent = "?";

    const back = document.createElement("div");
    back.className = "card-face back";
    back.textContent = word;

    card.appendChild(front);
    card.appendChild(back);

    card.onclick = () => {
      if (card.classList.contains("flip")) return;
      card.classList.add("flip");
    };

    grid.appendChild(card);
  });
}

function nextSong() {
  index++;
  if (index >= songs.length) index = 0;
  loadSong();
}

function playSong() {
  const audio = document.getElementById("audio");
  audio.currentTime = 0;
  audio.play();
}

function checkAnswer() {
  const guess = document.getElementById("guess").value.toLowerCase();
  const result = document.getElementById("result");

  if (guess.includes(current.answer)) {
    result.textContent = "✅ Правильно!";
  } else {
    result.textContent = "❌ Неправильно";
    result.classList.add("shake");
    setTimeout(() => result.classList.remove("shake"), 400);
  }
}

loadSong();
</script>

</body>
</html>
